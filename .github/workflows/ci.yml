name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          python -m py_compile port777.py
          python -m py_compile core/assistant.py
          python -m py_compile core/exploit_engine.py
          python -m py_compile core/executor.py
          python -m py_compile core/brain.py
          python -m py_compile core/post_exploit.py
          python -m py_compile core/payload_generator.py
          python -m py_compile core/compliance_mapper.py
          python -m py_compile core/attack_timeline.py
          python -m py_compile core/network_discovery.py
          python -m py_compile core/wordlist_generator.py

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=core --cov=utils --cov-report=term-missing

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r core/ utils/ server/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
        if: always()

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t port777:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm port777:${{ github.sha }} python -c "from core.exploit_engine import ExploitEngine; print('OK')"
